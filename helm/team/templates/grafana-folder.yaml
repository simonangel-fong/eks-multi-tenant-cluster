# Pre-creates the team's Grafana folder via a placeholder dashboard.
# The Grafana sidecar reads ConfigMaps labeled `grafana_dashboard: "1"`
# and organizes them by `grafana_folder` annotation.
# Team overwrites/deletes this once they add real dashboards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-welcome-dashboard" .Values.team }}
  namespace: monitoring
  labels:
    {{- include "team.labels" . | nindent 4 }}
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ printf "Team: %s" (.Values.team | title) | quote }}
data:
  welcome.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "type": "text",
          "title": "Welcome, team {{ .Values.team }}",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "content": "This folder was created by the TeamNamespace primitive.\n\nCommit dashboards to your app repo as ConfigMaps with these labels:\n\n```yaml\nmetadata:\n  labels:\n    grafana_dashboard: \"1\"\n  annotations:\n    grafana_folder: \"Team: {{ .Values.team | title }}\"\n```\n\nSee `docs/workload-contract.md` for the full pattern.",
            "mode": "markdown"
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["team", "{{ .Values.team }}"],
      "title": "Welcome — Team {{ .Values.team | title }}",
      "uid": "team-{{ .Values.team }}-welcome",
      "version": 1
    }
