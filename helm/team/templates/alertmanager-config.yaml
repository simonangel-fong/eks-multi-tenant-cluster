# Team's Alertmanager routing. Uses the AlertmanagerConfig CR from
# kube-prometheus-stack — the operator merges these into the runtime
# config using label matchers. No central-file edits.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: {{ .Values.team }}-routing
  namespace: monitoring
  labels:
    {{- include "team.labels" . | nindent 4 }}
    # Selector so the operator picks it up.
    alertmanagerConfig: platform
spec:
  route:
    receiver: {{ printf "%s-alerts" .Values.team }}
    groupBy: [alertname, severity]
    matchers:
      - name: team
        value: {{ .Values.team }}
    routes:
      - receiver: {{ printf "%s-oncall" .Values.team }}
        matchers:
          - name: severity
            value: critical
        continue: false
  receivers:
    - name: {{ printf "%s-alerts" .Values.team }}
      slackConfigs:
        - channel: {{ .Values.slack.alerts | quote }}
          apiURL:
            name: slack-webhook
            key: url
          sendResolved: true
          title: '{{ `{{ template "slack.default.title" . }}` }}'
          text: '{{ `{{ template "slack.default.text" . }}` }}'
    - name: {{ printf "%s-oncall" .Values.team }}
      slackConfigs:
        - channel: {{ .Values.slack.oncall | quote }}
          apiURL:
            name: slack-webhook
            key: url
          sendResolved: true
          title: '{{ `{{ template "slack.default.title" . }}` }}'
          text: '{{ `{{ template "slack.default.text" . }}` }}'
