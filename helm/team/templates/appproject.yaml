# ArgoCD AppProject for this team. Scopes what the team can deploy,
# where, and which cluster resources they may reference.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ .Values.team }}
  namespace: argocd
  labels:
    {{- include "team.labels" . | nindent 4 }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Workload project for team {{ .Values.team }}"
  sourceRepos:
    {{- range .Values.sourceRepos }}
    - {{ . | quote }}
    {{- end }}
  destinations:
    {{- range .Values.environments }}
    - server: https://kubernetes.default.svc
      namespace: {{ printf "%s-%s" $.Values.team . | quote }}
    {{- end }}
  clusterResourceWhitelist:
    # Teams may not create arbitrary cluster resources — namespaces
    # come from team-namespace, everything else stays platform-owned.
    - group: gateway.networking.k8s.io
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
