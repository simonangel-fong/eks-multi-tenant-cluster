# Team identity — required at install time.
team: ""                              # e.g. "voting"

# Subdomain the team owns. Kyverno enforces HTTPRoute hostnames match.
subdomain: ""                         # e.g. "voting.arguswatcher.net"

# Environments this team ships. Drives AppProject destination allowlist.
environments:
  - dev
  - prod

# Repos the team's Applications may source from.
sourceRepos:
  - https://github.com/simonangel-fong/project-eks-argocd

# Slack channels for team notifications. Routed by team=<team> label.
slack:
  alerts: "#platform-events"          # replace once team channel exists
  oncall: "#platform-oncall"          # replace once team channel exists
