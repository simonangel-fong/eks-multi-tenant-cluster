# Default-deny with explicit allows for platform ingress and DNS.
# Egress is permissive by default; strict egress declaration is roadmap.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: {{ include "team-namespace.name" . }}
  labels:
    {{- include "team-namespace.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-ingress
  namespace: {{ include "team-namespace.name" . }}
  labels:
    {{- include "team-namespace.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # From Istio Gateway (public entry point)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
    # From ztunnel + istiod (mesh dataplane)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    # From Prometheus (metrics scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
    # Intra-namespace (frontend ↔ backend within the team's app)
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress
  namespace: {{ include "team-namespace.name" . }}
  labels:
    {{- include "team-namespace.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Mesh dataplane (ztunnel + istiod)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    # Intra-namespace
    - to:
        - podSelector: {}
    # External HTTPS — permissive default. Strict egress on roadmap.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
