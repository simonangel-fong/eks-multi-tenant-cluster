apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "team-namespace.name" . }}
  labels:
    {{- include "team-namespace.labels" . | nindent 4 }}
    # Enroll in ambient mesh — ztunnel handles east-west encryption.
    istio.io/dataplane-mode: ambient
    # Pod Security Admission — defense in depth alongside Kyverno.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
  annotations:
    # Never prune the namespace itself even if the chart is removed —
    # avoids accidental deletion of all team workloads on a mis-edit.
    argocd.argoproj.io/sync-options: Prune=false
