{{- if .Values.rbac.oidcGroup }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-access
  namespace: {{ include "team-namespace.name" . }}
  labels:
    {{- include "team-namespace.labels" . | nindent 4 }}
subjects:
  - kind: Group
    name: {{ .Values.rbac.oidcGroup | quote }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: {{ .Values.rbac.clusterRole }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
