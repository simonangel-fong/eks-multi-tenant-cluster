# Team identity — required at install time.
team: ""              # e.g. "voting"
environment: ""       # "dev" or "prod"

# Overridable per environment. Defaults sized for a small dev team.
quota:
  cpu: "10"
  memory: "20Gi"
  pods: "50"
  pvc: "10"
  services: "10"

# Applied to every container without explicit resources.
# Kyverno enforces requests, so max here is a safety net.
limits:
  default:
    cpu: "500m"
    memory: "512Mi"
  defaultRequest:
    cpu: "100m"
    memory: "128Mi"
  max:
    cpu: "4"
    memory: "8Gi"

# RBAC role bound to the team's OIDC group.
# `edit` in dev, `view` in prod is the recommended pattern.
rbac:
  clusterRole: edit           # `edit` or `view`
  # Group name matches the OIDC claim from ArgoCD/Grafana SSO.
  # Format when GitHub OAuth is wired: "simonangel-fong:<team>-devs"
  # For now, no SSO — leave empty, RoleBinding subject list is empty.
  oidcGroup: ""
