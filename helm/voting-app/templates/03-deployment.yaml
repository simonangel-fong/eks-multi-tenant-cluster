apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "voting-app.api.fullname" . }}
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "voting-app.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "voting-app.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.flyway.enabled }}
      initContainers:
        - name: flyway
          image: "{{ .Values.flyway.image.repository }}:{{ .Values.flyway.image.tag }}"
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: {{ include "voting-app.api.fullname" . }}
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "voting-app.postgres.secretName" . }}
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "voting-app.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
          args:
            - -url=jdbc:postgresql://$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)
            - -user=$(DATABASE_USER)
            - -password=$(DATABASE_PASSWORD)
            - -connectRetries={{ .Values.flyway.connectRetries }}
            - -baselineOnMigrate={{ .Values.flyway.baselineOnMigrate }}
            - -baselineVersion={{ .Values.flyway.baselineVersion }}
            - migrate
          volumeMounts:
            - name: flyway-sql
              mountPath: /flyway/sql
              readOnly: true
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "voting-app.api.fullname" . }}
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "voting-app.postgres.secretName" . }}
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "voting-app.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)
            {{- with .Values.api.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.flyway.enabled }}
      volumes:
        - name: flyway-sql
          configMap:
            name: voting-flyway-sql
      {{- end }}
