services:
  postgres:
    image: postgres:16-alpine
    container_name: voting-postgres
    environment:
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: voting
      POSTGRES_DB: voting
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # auto-runs *.sql in lexical order on first startup only
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voting -d voting"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
