name: app-ci

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "sql/initdb/**"
      - ".github/workflows/app-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "app/**"
      - "sql/initdb/**"
      - ".github/workflows/app-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: voting
          POSTGRES_PASSWORD: voting
          POSTGRES_DB: voting
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voting -d voting"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://voting:voting@127.0.0.1:5432/voting
      TEST_DATABASE_URL: postgresql+psycopg://voting:voting@127.0.0.1:5432/voting_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.26"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create voting_test database
        env:
          PGPASSWORD: voting
        run: psql -h 127.0.0.1 -U voting -d voting -c "CREATE DATABASE voting_test OWNER voting;"

      - name: Flyway migrate — voting
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/app/flyway/sql:/flyway/sql:ro \
            flyway/flyway:10-alpine \
            -url=jdbc:postgresql://127.0.0.1:5432/voting \
            -user=voting -password=voting -connectRetries=10 migrate

      - name: Flyway migrate — voting_test
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/app/flyway/sql:/flyway/sql:ro \
            flyway/flyway:10-alpine \
            -url=jdbc:postgresql://127.0.0.1:5432/voting_test \
            -user=voting -password=voting -connectRetries=10 migrate

      - name: Install project deps
        working-directory: app
        run: uv sync --frozen

      - name: Run pytest
        working-directory: app
        run: uv run pytest -v

  # PR-only — proves the Dockerfile still builds, without pushing anywhere.
  build-check:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push, no load)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # master-only — build + push in a single Buildx invocation.
  push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: simonangelfong/voting-api
          tags: |
            type=sha,format=long
            type=sha,format=short

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
